<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>BMKG Earthquake Monitor</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background:
        linear-gradient(135deg,#dbeafe,#eff6ff,#bfdbfe);
    padding:30px;
    overflow-x:hidden;
}

/* =========================
   CONTAINER
========================= */

.container{
    max-width:1500px;
    margin:auto;
    display:grid;
    grid-template-columns:1.1fr 0.9fr;
    gap:25px;
}

.card{
    background:rgba(255,255,255,0.75);
    backdrop-filter:blur(20px);
    border-radius:30px;
    padding:30px;
    box-shadow:0 15px 40px rgba(37,99,235,0.12);
    border:1px solid rgba(255,255,255,0.4);
}

/* =========================
   HEADER
========================= */

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
    gap:20px;
    flex-wrap:wrap;
}

.header h1{
    color:#1d4ed8;
    font-size:40px;
}

.header p{
    color:#64748b;
    margin-top:8px;
}

.live-badge{
    background:#dc2626;
    color:white;
    padding:12px 18px;
    border-radius:999px;
    font-weight:700;
    animation:pulse 1.5s infinite;
}

@keyframes pulse{
    0%{
        transform:scale(1);
        opacity:1;
    }

    50%{
        transform:scale(1.08);
        opacity:0.8;
    }

    100%{
        transform:scale(1);
        opacity:1;
    }
}

/* =========================
   MAIN GEMPA CARD
========================= */

.main-earthquake{
    background:
        linear-gradient(135deg,#2563eb,#3b82f6);
    color:white;
    border-radius:30px;
    padding:30px;
    position:relative;
    overflow:hidden;
    margin-bottom:25px;
}

.main-earthquake::before{
    content:"";
    position:absolute;
    width:250px;
    height:250px;
    background:rgba(255,255,255,0.08);
    border-radius:50%;
    top:-80px;
    right:-80px;
}

.main-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:20px;
    flex-wrap:wrap;
    margin-bottom:25px;
    position:relative;
    z-index:2;
}

.location{
    max-width:700px;
}

.location h2{
    font-size:34px;
    margin-bottom:10px;
}

.location p{
    opacity:0.9;
    line-height:1.6;
}

.magnitude-box{
    background:white;
    color:#2563eb;
    width:140px;
    height:140px;
    border-radius:30px;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    box-shadow:0 15px 30px rgba(0,0,0,0.15);
}

.magnitude-box h1{
    font-size:52px;
}

.magnitude-box span{
    font-weight:700;
}

/* =========================
   INFO GRID
========================= */

.info-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:18px;
    position:relative;
    z-index:2;
}

.info-box{
    background:rgba(255,255,255,0.15);
    border:1px solid rgba(255,255,255,0.2);
    border-radius:20px;
    padding:18px;
}

.info-box label{
    display:block;
    font-size:13px;
    opacity:0.8;
    margin-bottom:8px;
}

.info-box strong{
    font-size:18px;
    line-height:1.5;
}

/* =========================
   POTENSI
========================= */

.warning-box{
    margin-top:22px;
    background:rgba(255,255,255,0.15);
    padding:20px;
    border-radius:22px;
    border:1px solid rgba(255,255,255,0.2);
    position:relative;
    z-index:2;
}

.warning-box h3{
    margin-bottom:10px;
}

/* =========================
   BUTTONS
========================= */

.button-group{
    display:flex;
    gap:15px;
    margin-bottom:25px;
    flex-wrap:wrap;
}

.btn{
    border:none;
    padding:16px 25px;
    border-radius:18px;
    cursor:pointer;
    font-weight:700;
    transition:0.3s;
    font-size:15px;
}

.btn:hover{
    transform:translateY(-3px);
}

.refresh-btn{
    background:#2563eb;
    color:white;
    box-shadow:0 10px 20px rgba(37,99,235,0.2);
}

.sound-btn{
    background:white;
    color:#2563eb;
}

/* =========================
   HISTORY
========================= */

.history-title{
    font-size:28px;
    color:#1e3a8a;
    margin-bottom:20px;
}

.history-list{
    display:flex;
    flex-direction:column;
    gap:18px;
    max-height:700px;
    overflow-y:auto;
    padding-right:5px;
}

.history-card{
    background:white;
    border-radius:24px;
    padding:22px;
    box-shadow:0 8px 20px rgba(0,0,0,0.05);
    transition:0.3s;
    animation:fadeIn 0.4s ease;
}

.history-card:hover{
    transform:translateY(-4px);
}

.history-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:15px;
    margin-bottom:15px;
}

.history-top h3{
    color:#1e293b;
}

.mag-badge{
    background:#dbeafe;
    color:#2563eb;
    padding:10px 14px;
    border-radius:15px;
    font-weight:700;
}

.history-info{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
    gap:12px;
}

.small-box{
    background:#eff6ff;
    padding:12px;
    border-radius:14px;
}

.small-box span{
    display:block;
    color:#64748b;
    font-size:12px;
    margin-bottom:6px;
}

.small-box strong{
    color:#1e293b;
    font-size:14px;
}

.loading{
    text-align:center;
    padding:40px;
    color:#2563eb;
    font-weight:700;
    font-size:18px;
}

/* =========================
   ANIMATION
========================= */

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* =========================
   RESPONSIVE
========================= */

@media(max-width:1100px){

    .container{
        grid-template-columns:1fr;
    }
}

@media(max-width:700px){

    body{
        padding:15px;
    }

    .card{
        padding:22px;
    }

    .header h1{
        font-size:30px;
    }

    .location h2{
        font-size:26px;
    }

    .magnitude-box{
        width:120px;
        height:120px;
    }

    .magnitude-box h1{
        font-size:40px;
    }

}

</style>
</head>
<body>

<div class="container">

    <!-- LEFT -->

    <div class="card">

        <div class="header">

            <div>
                <h1>BMKG Earthquake Monitor 🌍</h1>
                <p>Data realtime gempa bumi langsung dari BMKG Indonesia.</p>
            </div>

            <div class="live-badge">
                ● LIVE
            </div>

        </div>

        <div class="button-group">

            <button class="btn refresh-btn"
                onclick="fetchGempaData()">
                🔄 Refresh Data
            </button>

            <button class="btn sound-btn"
                onclick="toggleSound()"
                id="soundBtn">
                🔊 Sound ON
            </button>

        </div>

        <!-- MAIN GEMPA -->

        <div class="main-earthquake">

            <div class="main-top">

                <div class="location">

                    <h2 id="wilayah">
                        Memuat lokasi...
                    </h2>

                    <p id="tanggal">
                        Mengambil data terbaru dari BMKG...
                    </p>

                </div>

                <div class="magnitude-box">

                    <h1 id="magnitudo">
                        0.0
                    </h1>

                    <span>MAGNITUDE</span>

                </div>

            </div>

            <div class="info-grid">

                <div class="info-box">
                    <label>Jam</label>
                    <strong id="jam">-</strong>
                </div>

                <div class="info-box">
                    <label>Kedalaman</label>
                    <strong id="kedalaman">-</strong>
                </div>

                <div class="info-box">
                    <label>Koordinat</label>
                    <strong id="koordinat">-</strong>
                </div>

                <div class="info-box">
                    <label>Dirasakan</label>
                    <strong id="dirasakan">-</strong>
                </div>

            </div>

            <div class="warning-box">

                <h3>⚠ Potensi Gempa</h3>

                <p id="potensi">
                    -
                </p>

            </div>

        </div>

    </div>

    <!-- RIGHT -->

    <div class="card">

        <h2 class="history-title">
            Gempa Terkini BMKG
        </h2>

        <div class="history-list" id="historyList">

            <div class="loading">
                Mengambil data BMKG...
            </div>

        </div>

    </div>

</div>

<script>

/* =========================
   BMKG API
========================= */

const autoGempaAPI =
    "https://data.bmkg.go.id/DataMKG/TEWS/autogempa.json";

const gempaTerkiniAPI =
    "https://data.bmkg.go.id/DataMKG/TEWS/gempaterkini.json";

let soundEnabled = true;

/* =========================
   SOUND
========================= */

function playAlertSound(){

    if(!soundEnabled) return;

    const audio = new Audio(
        "https://actions.google.com/sounds/v1/alarms/beep_short.ogg"
    );

    audio.play();
}

function toggleSound(){

    soundEnabled = !soundEnabled;

    const btn =
        document.getElementById("soundBtn");

    btn.innerHTML =
        soundEnabled
        ? "🔊 Sound ON"
        : "🔇 Sound OFF";
}

/* =========================
   AUTO GEMPA
========================= */

async function fetchGempaData(){

    try{

        const response =
            await fetch(autoGempaAPI);

        const data =
            await response.json();

        /* =========================
           INI DATA DARI BMKG
        ========================= */

        const gempa =
            data.Infogempa.gempa;

        /* =========================
           MASUKKAN KE HTML
        ========================= */

        document.getElementById("wilayah")
            .textContent = gempa.Wilayah;

        document.getElementById("tanggal")
            .textContent =
            `${gempa.Tanggal}`;

        document.getElementById("magnitudo")
            .textContent =
            gempa.Magnitude;

        document.getElementById("jam")
            .textContent =
            gempa.Jam;

        document.getElementById("kedalaman")
            .textContent =
            gempa.Kedalaman;

        document.getElementById("koordinat")
            .textContent =
            gempa.Coordinates;

        document.getElementById("dirasakan")
            .textContent =
            gempa.Dirasakan || "Tidak ada data";

        document.getElementById("potensi")
            .textContent =
            gempa.Potensi;

        playAlertSound();

    }catch(error){

        alert(
            "Gagal mengambil data BMKG!"
        );

        console.error(error);
    }
}

/* =========================
   GEMPA TERKINI LIST
========================= */

async function fetchHistory(){

    const historyList =
        document.getElementById("historyList");

    try{

        const response =
            await fetch(gempaTerkiniAPI);

        const data =
            await response.json();

        /* =========================
           DATA DARI BMKG
        ========================= */

        const earthquakes =
            data.Infogempa.gempa;

        historyList.innerHTML = "";

        earthquakes.forEach(quake => {

            const card =
                document.createElement("div");

            card.className =
                "history-card";

            card.innerHTML = `

                <div class="history-top">

                    <h3>
                        ${quake.Wilayah}
                    </h3>

                    <div class="mag-badge">
                        M ${quake.Magnitude}
                    </div>

                </div>

                <div class="history-info">

                    <div class="small-box">
                        <span>Tanggal</span>
                        <strong>
                            ${quake.Tanggal}
                        </strong>
                    </div>

                    <div class="small-box">
                        <span>Jam</span>
                        <strong>
                            ${quake.Jam}
                        </strong>
                    </div>

                    <div class="small-box">
                        <span>Kedalaman</span>
                        <strong>
                            ${quake.Kedalaman}
                        </strong>
                    </div>

                    <div class="small-box">
                        <span>Potensi</span>
                        <strong>
                            ${quake.Potensi}
                        </strong>
                    </div>

                </div>

            `;

            historyList.appendChild(card);
        });

    }catch(error){

        historyList.innerHTML = `
            <div class="loading">
                Gagal mengambil data BMKG.
            </div>
        `;

        console.error(error);
    }
}

/* =========================
   AUTO REFRESH
========================= */

setInterval(() => {

    fetchGempaData();
    fetchHistory();

}, 60000);

/* =========================
   LOAD
========================= */

fetchGempaData();
fetchHistory();

</script>

</body>
</html>
