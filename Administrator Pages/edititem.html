<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Item</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

/* RESET */
* {
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Montserrat',sans-serif;
}

/* BACKGROUND */
body {
    background: rgba(0,0,0,0.45);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* MODAL */
.modal-box {
    background:#fff;
    width:550px;
    border-radius:18px;
    padding:25px 30px;
}

/* TITLE */
h2 {
    font-size:22px;
    font-weight:800;
    margin-bottom:20px;
    border-bottom:1px solid #eee;
    padding-bottom:10px;
}

/* FORM */
.form-group {
    margin-bottom:18px;
}

label {
    font-size:13px;
    color:#444;
    display:block;
    margin-bottom:6px;
}

input {
    width:100%;
    padding:12px;
    border-radius:12px;
    border:1px solid #e5e7eb;
    font-size:13px;
}

/* ROW (biar sejajar kayak figma) */
.row {
    display:flex;
    align-items:center;
    gap:20px;
}

/* IMAGE PREVIEW */
.preview-box {
    background:#f4f6f8;
    border-radius:15px;
    padding:10px;
    display:inline-block;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.preview-box img {
    width:90px;
}

/* TAG */
.tag-input {
    background:#f4f6f8;
    border-radius:12px;
    padding:8px 12px;
    display:inline-block;
}

.tag {
    background:#3b82f6;
    color:#fff;
    padding:6px 12px;
    border-radius:999px;
    font-size:12px;
}

/* HALF INPUT */
.half {
    width:60%;
}

/* BUTTON */
.actions {
    display:flex;
    justify-content:center;
    gap:12px;
    margin-top:25px;
}

button {
    padding:12px 25px;
    border-radius:10px;
    border:none;
    font-weight:600;
    font-size:13px;
    cursor:pointer;
}

/* COLORS */
.btn-cancel {
    background:#3b82f6;
    color:#fff;
}

.btn-save {
    background:#84cc16;
    color:#fff;
}

/* HOVER */
.btn-cancel:hover { background:#2563eb; }
.btn-save:hover { background:#65a30d; }

</style>
</head>

<body>

<div class="modal-box">

    <h2>Edit Item</h2>

    <div class="form-group">
        <label>Item Name</label>
        <input type="text" value="Adventure Awaits">
    </div>

    <div class="form-group row">
        <label style="width:120px;">Current Item</label>
        <div class="preview-box">
            <img src="https://cdn-icons-png.flaticon.com/512/892/892458.png">
        </div>
    </div>

    <div class="form-group row">
        <label style="width:120px;">Type</label>
        <div class="tag-input">
            <span class="tag">Shirts ×</span>
        </div>
    </div>

    <div class="form-group row">
        <label style="width:120px;">Level Requirement</label>
        <input class="half" type="number" value="5">
    </div>

    <div class="form-group row">
        <label style="width:120px;">Price (Coins)</label>
        <input class="half" type="number" value="80">
    </div>

    <div class="actions">
        <button class="btn-cancel" onclick="goBack()">Cancel</button>
        <button class="btn-save">Save Changes</button>
    </div>

</div>

<script>
function goBack(){
    window.history.back();
}
</script>

</body>
</html>
