<!-- MAIN CONTENT -->
<main class="main-content">

<header class="header">
<h1>AetherAssist</h1>

            <a href="profile.html" class="user-badge-link">
            <div class="user-badge">
                <div class="user-info">
                    <span class="name">Username</span>
                    <span class="level">Level 01</span>
                </div>
                <div class="user-avatar"></div>
            </div>
            </a>
</header>


<section class="hero-card">


<h1>
Hey User, <span>aetherassist here!</span><br>
What's on your mind today?
</h1>


<!-- CHAT -->
<div class="chat-container">

<div class="chat-messages" id="chatMessages">

<div class="bot-message">
Hello! I'm AetherAssist. How can I help you today?
</div>

</div>


<div class="chat-box">

<button class="upload-btn" 
onclick="document.getElementById('fileInput').click()">
+
</button>

<input 
type="text" 
id="chatInput" 
placeholder="Ask Aetherna..." 
/>

<button onclick="sendMessage()">➤</button>

</div>


<input 
type="file" 
id="fileInput" 
hidden 
onchange="showFile(this)"
>

</div>

</section>

</main>
</div>


<script>

function sendMessage(){

let input = document.getElementById("chatInput");
let messages = document.getElementById("chatMessages");

if(input.value.trim() === "") return;


/* USER MESSAGE */
let userMsg = document.createElement("div");
userMsg.className = "user-message";
userMsg.innerText = input.value;
messages.appendChild(userMsg);


/* BOT MESSAGE */
let botMsg = document.createElement("div");
botMsg.className = "bot-message";
botMsg.innerText = "Thinking...";
messages.appendChild(botMsg);


setTimeout(()=>{
botMsg.innerText = "I'm still learning, but I'll help you soon ✨";
},1000);


input.value = "";

messages.scrollTop = messages.scrollHeight;

}


/* FILE UPLOAD */
function showFile(input){

let messages = document.getElementById("chatMessages");

let fileMsg = document.createElement("div");
fileMsg.className = "user-message";
fileMsg.innerText = "📎 " + input.files[0].name;

messages.appendChild(fileMsg);

messages.scrollTop = messages.scrollHeight;

}


/* ENTER KEY */
document.getElementById("chatInput").addEventListener("keypress", function(e){
if(e.key === "Enter"){
sendMessage();
}
});

</script>
