<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup Profile - AETHERNA</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="setup.css">
</head>
<body>

<a href="sign-up.html" class="back-btn">
    <span>←</span>
</a>

<div class="container">

    <h1>Welcome</h1>
    <p class="subtitle">Hi there! Let's set up your profile in just a few taps.</p>

    <!-- Name -->
    <div class="input-group">
        <label>What should we call you?</label>
        <input type="text" placeholder="Your name">
    </div>

    <!-- Body Stats -->
    <div class="input-group">
        <label>Your body stats (so we can track better)</label>

        <div class="stats">
            <div class="box">
                <input type="number" placeholder="Weight">
                <span>kg</span>
            </div>

            <div class="box">
                <input type="number" placeholder="Height">
                <span>cm</span>
            </div>
        </div>
    </div>

    <!-- NEXT BUTTON -->
    <button class="next-btn" onclick="window.location.href='setup2.html'">Next →</button>

</div>

</body>
</html>
