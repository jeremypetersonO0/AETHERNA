<script type="module">
// Impor fungsi pembantu dan objek auth dari file firebase.js
import { saveToFirestore, getChatHistory, auth } from "./firebase.js"; 

let selectedFile = null; 

// =================================================================
// 🔄 FUNGSI ME-LOAD BUBBLE CHAT LAMA SAAT PINDAH HALAMAN
// =================================================================
async function loadChatHistory() {
    let messagesContainer = document.getElementById("chatMessages");
    if (!messagesContainer) return;

    messagesContainer.innerHTML = ""; // Bersihkan layar container chat
    
    console.log("Mengambil riwayat bubble chat dari Firestore...");
    const history = await getChatHistory();
    
    // Looping untuk menggambar ulang bubble chat di layar
    history.forEach(chat => {
        let msgDiv = document.createElement("div");
        
        if (chat.sender === "user") {
            if (chat.fileName && chat.message === "Mengirim lampiran file") {
                msgDiv.className = "user-message file-attachment";
                msgDiv.innerText = "📎 Lampiran: " + chat.fileName;
            } else {
                msgDiv.className = "user-message";
                msgDiv.innerText = chat.message;
            }
        } else {
            msgDiv.className = "bot-message";
            msgDiv.innerText = chat.message;
        }
        
        messagesContainer.appendChild(msgDiv);
    });
    
    messagesContainer.scrollTop = messagesContainer.scrollHeight;
}

// =================================================================
// LOGIKA TOMBOL + (PILIH FILE) & TOMBOL KIRIM CHAT GLOBAL
// =================================================================

window.showFile = function(input) {
    if (input.files && input.files[0]) {
        selectedFile = input.files[0];
        
        let messages = document.getElementById("chatMessages");
        let fileMsg = document.createElement("div");
        fileMsg.className = "user-message file-attachment";
        fileMsg.innerText = "📎 Siap dikirim: " + selectedFile.name;
        messages.appendChild(fileMsg);
        messages.scrollTop = messages.scrollHeight;
    }
}

// PERBAIKAN: Diubah menjadi window.sendMessage agar tombol klik ➤ di HTML bisa mendeteksi fungsi ini
window.sendMessage = async function() {
    let input = document.getElementById("chatInput");
    let messages = document.getElementById("chatMessages");

    if (!input || (input.value.trim() === "" && !selectedFile)) return;

    let userText = input.value;
    let currentFileName = selectedFile ? selectedFile.name : null;

    /* 1. TAMPILKAN PESAN USER DAN SIMPAN KE FIREBASE */
    if (userText.trim() !== "") {
        let userMsg = document.createElement("div");
        userMsg.className = "user-message";
        userMsg.innerText = userText;
        messages.appendChild(userMsg);
        
        await saveToFirestore("user", userText, currentFileName);
    } else if (currentFileName) {
        await saveToFirestore("user", "Mengirim lampiran file", currentFileName);
    }

    input.value = "";
    messages.scrollTop = messages.scrollHeight;

    /* 2. BALON AKAN LOADING UNTUK JAWABAN BOT */
    let botMsg = document.createElement("div");
    botMsg.className = "bot-message";
    botMsg.innerText = "AetherAssist sedang berpikir... 🧠";
    messages.appendChild(botMsg);
    messages.scrollTop = messages.scrollHeight;

    /* 3. KEMAS DATA UNTUK SERVER NODE.JS BACKEND */
    const formData = new FormData();
    if (userText) formData.append('message', userText);
    if (selectedFile) {
        formData.append('file', selectedFile);
        selectedFile = null; 
        document.getElementById('fileInput').value = ""; 
    }

    /* 4. HUBUNGKAN KE BACKEND */
    try {
        const response = await fetch('https://aetherna-production.up.railway.app/api/chat', {
            method: 'POST',
            body: formData 
        });

        const data = await response.json();
        botMsg.innerText = data.reply;
        
        // Simpan jawaban bot ke Firebase
        await saveToFirestore("bot", data.reply, null);

    } catch (error) {
        console.error("Error:", error);
        botMsg.innerText = "AetherAssist gagal memproses file atau pesan kamu. 😓";
    }

    messages.scrollTop = messages.scrollHeight;
}

// =================================================================
// DETECTION EVENT: MENANGANI STATUS LOGIN & TOMBOL ENTER
// =================================================================
document.addEventListener("DOMContentLoaded", () => {
    // Pastikan Firebase memverifikasi akun pengguna yang sedang login lebih dulu
    auth.onAuthStateChanged(async (user) => {
        if (user) {
            console.log("User terdeteksi login:", user.email);
            await loadChatHistory(); // Panggil bubble chat setelah user valid
        } else {
            console.warn("User belum login.");
            let messagesContainer = document.getElementById("chatMessages");
            if (messagesContainer) {
                messagesContainer.innerHTML = "<div class='bot-message'>Silakan login terlebih dahulu untuk mengakses riwayat AetherAssist.</div>";
            }
        }
    });

    // Pasang ulang listener tombol Enter agar bisa kirim pesan lewat keyboard
    const chatInput = document.getElementById("chatInput");
    if (chatInput) {
        chatInput.addEventListener("keypress", function(e) {
            if (e.key === "Enter") {
                window.sendMessage();
            }
        });
    }
});
</script>
