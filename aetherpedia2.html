<!-- ================= RENDER LOGIC ================= -->
<script>
const CURRENT_PAGE = "all"; // ganti sesuai halaman: "rest", "exercise", "nutrition", "movement", "mindset"

function buildHighlight(article) {
  const div = document.createElement("div");
  div.className = "highlight";
  div.innerHTML = `
    <img src="${article.image}" class="highlight-img">
    <h3>${article.title}</h3>
    <p>${article.excerpt}</p>
    <div class="meta">
      <span class="category-tag">${article.category}</span>
      <span class="dot">•</span>
      <span class="author-name">${article.author}</span>
    </div>
  `;
  div.addEventListener("click", () => openArticleById(article.id));
  return div;
}

function buildCard(article) {
  const div = document.createElement("div");
  div.className = "card";
  div.innerHTML = `
    <img src="${article.image}">
    <h4>${article.title}</h4>
    <p>${article.excerpt}</p>
    <div class="card-meta">
      <span class="card-category">${article.category}</span>
      <span class="dot">•</span>
      <span class="card-author">${article.author}</span>
    </div>
  `;
  div.addEventListener("click", () => openArticleById(article.id));
  return div;
}

function buildPopular(article) {
  const div = document.createElement("div");
  div.className = "popular";
  div.innerHTML = `
    <div class="popular-text">
      <h4>${article.title}</h4>
      <div class="meta">
        <span class="category-tag">${article.category}</span>
        <span class="dot">•</span>
        <span class="author-name">${article.author}</span>
      </div>
    </div>
    <img src="${article.image}" class="popular-img">
  `;
  div.addEventListener("click", () => openArticleById(article.id));
  return div;
}

function renderArticles() {
  const pageArticles = articles.filter(a => a.page === CURRENT_PAGE);

  const highlightContainer = document.getElementById("highlightContainer");
  const gridContainer = document.getElementById("gridContainer");
  const popularContainer = document.getElementById("popularContainer");

  pageArticles.forEach(article => {
    if (article.section === "highlight") {
      highlightContainer.appendChild(buildHighlight(article));
    } else if (article.section === "grid") {
      gridContainer.appendChild(buildCard(article));
    } else if (article.section === "popular") {
      popularContainer.appendChild(buildPopular(article));
    }
  });
}

function openArticleById(id) {
  const article = articles.find(a => a.id === id);
  if (!article) return;
  openArticle(article.title, article.author, article.category, article.text, article.image);
}

document.addEventListener("DOMContentLoaded", () => {
  renderArticles();
  setupSearch();
});

function setupSearch() {
  const searchInput = document.getElementById("search");

  searchInput.addEventListener("input", (e) => {
    const value = e.target.value.toLowerCase().trim();
    const cards = document.querySelectorAll(".card");

    cards.forEach((card) => {
      const title = card.querySelector("h4").textContent.toLowerCase();
      const desc = card.querySelector("p").textContent.toLowerCase();
      const match = title.includes(value) || desc.includes(value);
      card.classList.toggle("hidden", !match);
    });
  });
}
</script>

<!-- ================= POPUP / MODAL ================= -->
<script>
function openArticle(title, author, category, text, image){
  document.getElementById("popupTitle").textContent = title;
  document.getElementById("popupAuthor").textContent = author;
  document.getElementById("popupCategory").textContent = category;
  document.getElementById("popupText").textContent = text;
  document.getElementById("popupImage").src = image;

  document.getElementById("articlePopup").style.display = "flex";
  document.body.classList.add("modal-open");
}

function closeArticle(){
  document.getElementById("articlePopup").style.display = "none";
  document.body.classList.remove("modal-open");
}

function shareArticle(){
  navigator.clipboard.writeText(window.location.href);
  alert("Link copied!");
}
</script>

<div id="articlePopup" class="modal" style="display:none;">
    <div class="modal-content">
        <span class="close-btn" onclick="closeArticle()">&times;</span>

        <img id="popupImage" src="" alt="Article Image" style="width:100%; border-radius: 10px;">

        <div class="modal-body">
            <span id="popupCategory" class="category-tag"></span>
            <h2 id="popupTitle"></h2>
            <p class="author">By <span id="popupAuthor"></span></p>
            <hr>
            <p id="popupText"></p>
        </div>

        <div class="modal-footer">
            <button onclick="shareArticle()" class="share-btn">🔗 Share Link</button>
        </div>
    </div>
</div>
