<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aetherna - AetherPlay</title>

    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="aetherpedia2.css">
    <link rel="stylesheet" href="aetherplay.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* CSS Tambahan untuk interaktivitas Tab Toko */
        .tab-btn {
            background: none;
            border: none;
            padding: 8px 16px;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            font-weight: 600;
            color: #888;
            cursor: pointer;
            transition: 0.2s;
        }
        .tab-btn.active {
            color: #6c5ce7 !important;
            border-bottom: 3px solid #6c5ce7 !important;
        }
        .shop-item-card {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .shop-item-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.06) !important;
        }
    </style>
</head>

<body>

<div class="container">

    <aside class="sidebar">
        <div class="logo-box">
            <img src="Group 39.png" class="logo-img" alt="logo">
            <h3>AETHERNA</h3>
        </div>

        <nav>
            <p class="menu-title">Feature</p>
            <ul class="menu">
                <li class="menu-item"><a href="dashborad.html">🏠 Dashboard</a></li>
                <li class="menu-item"><a href="aetherlog.html">📄 aetherlog</a></li>
                <li class="menu-item"><a href="aetherpedia2.html">📘 aetherpedia</a></li>
                <li class="menu-item"><a href="aetherflow.html">🏃 aetherflow</a></li>
                <li class="menu-item"><a href="aetherassist.html">🧠 aetherassist</a></li>
                <li class="menu-item"><a href="aetherplay.html">🎮 aetherPlay</a></li>
            </ul>

            <p class="menu-title">General</p>
            <ul class="menu">
                <li class="menu-item">
                    <a href="logout.html">
                        <span>⏻</span> Log Out
                    </a>
                </li>
            </ul>
        </nav>
    </aside>

    <main class="main-content">

        <header class="header">
            <h1>AetherPlay</h1>
            <div class="header-right">
                <a href="profile.html" class="user-badge-link">
                    <div class="user-badge">
                        <div class="user-info">
                            <span class="name" id="header-username">Username</span>
                            <span class="level" id="header-level">Level 01</span>
                        </div>
                        <div class="user-avatar" id="header-avatar-preview"></div>
                    </div>
                </a>
            </div>
        </header>

        <section class="page-content">
            <div class="game-container">

                <div class="avatar-panel">
                    <div class="avatar-box">
                        <div class="coin-badge">
                            <span class="coin-icon">🪙</span>
                            <span class="coin-amount">0</span>
                        </div>
                        
                        <img src="image/aetherplay/avatar/head.png" id="head" class="layer">
                        <img src="image/aetherplay/avatar/body.png" id="body" class="layer">
                        <img src="image/aetherplay/avatar/mata_default.png" id="eyes" class="layer">
                        <img src="image/aetherplay/avatar/hidung_default.png" id="nose" class="layer">
                        <img src="image/aetherplay/avatar/mulut_default.png" id="mouth" class="layer">
                        <img src="image/aetherplay/avatar/blush_1.png" id="blush1" class="layer" style="display:none;">
                        <img src="image/aetherplay/avatar/blush_1.png" id="blush2" class="layer" style="display:none;">
                        <img src="image/aetherplay/rambut/Hair2.png" id="hair" class="layer">
                        <img src="image/aetherplay/avatar/baju_default.png" id="baju" class="layer">
                        <img src="image/aetherplay/avatar/celana_default.png" id="celana" class="layer">
                    </div>

                    <div class="avatar-info">
                        <p id="avatar-level-text">Memuat Level...</p>
                        <div class="level-bar">
                            <div class="progress" id="avatar-exp-progress" style="width: 0%;"></div>
                        </div>
                    </div>
                </div>

                <div class="custom-panel">
                    <h3>Custom Avatar</h3>
                    
                    <div class="tabs" style="display: flex; gap: 8px; overflow-x: auto; white-space: nowrap; padding-bottom: 8px; border-bottom: 2px solid #eef2f5;">
                        <button class="tab-btn active" onclick="switchShopTab('tshirt', 'shop-tshirt', this)">T-Shirt</button>
                        <button class="tab-btn" onclick="switchShopTab('dress', 'shop-dress', this)">Dress</button>
                        <button class="tab-btn" onclick="switchShopTab('sweater', 'shop-sweater', this)">Sweater</button>
                        <button class="tab-btn" onclick="switchShopTab('crop_top', 'shop-croptop', this)">Crop-Top</button>
                        <button class="tab-btn" onclick="switchShopTab('long_sleeve', 'shop-longsleeve', this)">Long Sleeve</button>
                        <button class="tab-btn" onclick="switchShopTab('puffy_sleeve', 'shop-puffysleeve', this)">Puffy Sleeve</button>
                        <button class="tab-btn" onclick="switchShopTab('sleeveless', 'shop-sleeveless', this)">Sleeveless</button>
                        <button class="tab-btn" onclick="switchShopTab('hair', 'shop-hair', this)">Hair</button>
                        <button class="tab-btn" onclick="switchShopTab('eyes', 'shop-eyes', this)">Eyes</button>
                        <button class="tab-btn" onclick="switchShopTab('nose', 'shop-nose', this)">Nose</button>
                        <button class="tab-btn" onclick="switchShopTab('mouth', 'shop-mouth', this)">Mouth</button>
                        <button class="tab-btn" onclick="switchShopTab('left_blush', 'shop-lblush', this)">Left Blush</button>
                        <button class="tab-btn" onclick="switchShopTab('right_blush', 'shop-rblush', this)">Right Blush</button>
                    </div>

                    <div class="tab-content" style="margin-top: 15px; max-height: 300px; overflow-y: auto; padding-right: 5px;">
                        <div id="shop-tshirt" class="shop-grid-panel" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;"></div>
                        <div id="shop-dress" class="shop-grid-panel" style="display: none; grid-template-columns: repeat(3, 1fr); gap: 12px;"></div>
                        <div id="shop-sweater" class="shop-grid-panel" style="display: none; grid-template-columns: repeat(3, 1fr); gap: 12px;"></div>
                        <div id="shop-croptop" class="shop-grid-panel" style="display: none; grid-template-columns: repeat(3, 1fr); gap: 12px;"></div>
                        <div id="shop-longsleeve" class="shop-grid-panel" style="display: none; grid-template-columns: repeat(3, 1fr); gap: 12px;"></div>
                        <div id="shop-puffysleeve" class="shop-grid-panel" style="display: none; grid-template-columns: repeat(3, 1fr); gap: 12px;"></div>
                        <div id="shop-sleeveless" class="shop-grid-panel" style="display: none; grid-template-columns: repeat(3, 1fr); gap: 12px;"></div>
                        <div id="shop-hair" class="shop-grid-panel" style="display: none; grid-template-columns: repeat(3, 1fr); gap: 12px;"></div>
                        <div id="shop-eyes" class="shop-grid-panel" style="display: none; grid-template-columns: repeat(3, 1fr); gap: 12px;"></div>
                        <div id="shop-nose" class="shop-grid-panel" style="display: none; grid-template-columns: repeat(3, 1fr); gap: 12px;"></div>
                        <div id="shop-mouth" class="shop-grid-panel" style="display: none; grid-template-columns: repeat(3, 1fr); gap: 12px;"></div>
                        <div id="shop-lblush" class="shop-grid-panel" style="display: none; grid-template-columns: repeat(3, 1fr); gap: 12px;"></div>
                        <div id="shop-rblush" class="shop-grid-panel" style="display: none; grid-template-columns: repeat(3, 1fr); gap: 12px;"></div>
                    </div>

                    <button id="save-avatar-btn" style="width: 100%; padding: 12px; background: #6c5ce7; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 15px;">
                        💾 Simpan Avatar
                    </button>
                </div>

            </div>
        </section>

    </main>
</div>

<div id="aether-confirm-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); z-index: 100000; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.2s ease;">
    <div style="background: #fff; width: 360px; padding: 24px; border-radius: 16px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.25); transform: scale(0.8); transition: transform 0.2s ease;" id="confirm-modal-box">
        <div style="font-size: 40px; margin-bottom: 12px;">🪙</div>
        <h3 style="font-family: 'Poppins', sans-serif; font-size: 18px; font-weight: 600; color: #333; margin-bottom: 8px;">Konfirmasi Pembelian</h3>
        <p id="confirm-modal-text" style="font-family: 'Poppins', sans-serif; font-size: 14px; color: #666; margin-bottom: 24px; line-height: 1.5;">Apakah kamu yakin ingin membeli item ini?</p>
        <div style="display: flex; gap: 12px; justify-content: center;">
            <button id="confirm-cancel-btn" style="flex: 1; padding: 10px; background: #f1f5f9; color: #64748b; border: none; border-radius: 8px; font-family: 'Poppins', sans-serif; font-weight: 600; cursor: pointer; transition: 0.2s;">Batal</button>
            <button id="confirm-accept-btn" style="flex: 1; padding: 10px; background: #6c5ce7; color: #fff; border: none; border-radius: 8px; font-family: 'Poppins', sans-serif; font-weight: 600; cursor: pointer; transition: 0.2s;">Beli</button>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script type="module" src="aetherplay.js"></script>
<script type="module" src="shared-header.js"></script>

</body>
</html>
