<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content - Aetherna</title>

    <!-- GLOBAL STYLE (ambil dari dashboard biar konsisten) -->
    <link rel="stylesheet" href="dashboard_admin.css">
    <link rel="stylesheet" href="content_admin.css">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>

<div class="dashboard-container">

    <!-- SIDEBAR (SAMA PERSIS) -->
    <aside class="sidebar">
        <div class="logo-box">
            <img src="LOGO.png" alt="Aetherna">
            <h3>AETHERNA</h3>
        </div>
        
        <nav class="sidebar-nav">
            <p class="section-label">Feature</p>
            <ul>
                <li class="nav-item"><a href="dashboard_admin.html"><i class="fa-solid fa-table-columns"></i> Dashboard</a></li>
                <li class="nav-item"><a href="userlog_admin.html"><i class="fa-solid fa-book"></i> User Log</a></li>
                <li class="nav-item active"><a href="#"><i class="fa-solid fa-file-lines"></i> Content</a></li>
                <li class="nav-item"><a href="analytics_admin.html"><i class="fa-solid fa-chart-simple"></i> Analytics</a></li>
                <li class="nav-item"><a href="play_admin.html"><i class="fa-solid fa-gamepad"></i> Play</a></li>
                <p class="section-label">General</p>
                <li class="nav-item">
                    <a href="logout_admin.html">
                        <span>⏻</span> Log Out
                    </a> </li>
            </ul>
        </nav>
    </aside>

    <!-- MAIN -->
    <main class="main-content">

        <h1>Content</h1>

        <!-- ACTION + SEARCH -->
        <div class="content-topbar">
            <div class="left-actions">
                <button class="btn-green" onclick="window.location.href='uploadarticle.html'"><i class="fa-solid fa-plus"></i> Upload Article</button>
                <button class="btn-green" onclick="window.location.href='uploadvideo.html'"><i class="fa-solid fa-plus"></i> Upload Video</button>
            </div>

            <div class="right-actions">
                <input type="text" placeholder="Search by name">
                <select>
                    <option>Filter by Type</option>
                    <option>Article</option>
                    <option>Video</option>
                </select>
            </div>
        </div>

        <!-- TABLE -->
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Type</th>
                        <th>Author</th>
                        <th>Tags</th>
                        <th>Status</th>
                        <th>Views</th>
                        <th>Last Updated</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="contentTable">

                </tbody>
            </table>
        </div>


    </main>
</div>

<div id="deleteModal" class="modal">

    <div class="modal-content">

        <h2 id="deleteTitle">Delete Content?</h2>

        <p id="deleteText">
            Are you sure you want to delete
            <br>
            "<span id="contentName"></span>"?
        </p>

        <p class="warning">
            This action cannot be undone.
        </p>

        <div class="modal-buttons">
            <button id="cancelDelete" class="btn-cancel">
                Cancel
            </button>

            <button id="confirmDelete" class="btn-delete-confirm">
                Delete
            </button>
        </div>

    </div>
</div>

<script type="module" src="content_admin.js"></script>


</div>
</body>
</html>
