<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blue Calculator</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #dbeafe, #60a5fa);
            padding: 20px;
        }

        .calculator {
            width: 340px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 24px;
            box-shadow:
                0 10px 30px rgba(37, 99, 235, 0.2),
                0 4px 10px rgba(0, 0, 0, 0.08);
        }

        .title {
            text-align: center;
            margin-bottom: 20px;
        }

        .title h1 {
            color: #1d4ed8;
            font-size: 2rem;
            font-weight: 700;
        }

        .title p {
            color: #60a5fa;
            font-size: 0.95rem;
            margin-top: 4px;
        }

        #display {
            width: 100%;
            height: 85px;
            border: none;
            outline: none;
            border-radius: 20px;
            background: #eff6ff;
            color: #1e3a8a;
            text-align: right;
            padding: 20px;
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 22px;
            box-shadow: inset 0 3px 8px rgba(0, 0, 0, 0.05);
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            height: 65px;
            border: none;
            border-radius: 18px;
            font-size: 1.15rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:active {
            transform: scale(0.95);
        }

        /* ANGKA */
        .number {
            background: white;
            color: #1e3a8a;
            box-shadow: 0 4px 10px rgba(59, 130, 246, 0.08);
        }

        .number:hover {
            background: #f8fbff;
        }

        /* OPERATOR */
        .operator {
            background: #3b82f6;
            color: white;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.25);
        }

        .operator:hover {
            background: #2563eb;
        }

        /* CLEAR & DEL */
        .special {
            background: #bfdbfe;
            color: #1d4ed8;
        }

        .special:hover {
            background: #93c5fd;
        }

        /* TOMBOL = */
        .equal {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            grid-row: span 2;
            height: 142px;
            font-size: 1.5rem;
            box-shadow: 0 5px 15px rgba(37, 99, 235, 0.3);
        }

        .equal:hover {
            background: linear-gradient(135deg, #1d4ed8, #1e40af);
        }

        .zero {
            grid-column: span 2;
        }

        @media (max-width: 480px) {
            .calculator {
                width: 100%;
                max-width: 340px;
            }
        }
    </style>
</head>

<body>

    <div class="calculator">

        <div class="title">
            <h1>💙 Blue Calculator</h1>
            <p>Simple Modern Calculator</p>
        </div>

        <input type="text" id="display" readonly placeholder="0">

        <div class="buttons">

            <!-- Baris 1 -->
            <button class="special" onclick="clearDisplay()">C</button>
            <button class="special" onclick="backspace()">DEL</button>
            <button class="operator" onclick="appendValue('/')">÷</button>
            <button class="operator" onclick="appendValue('*')">×</button>

            <!-- Baris 2 -->
            <button class="number" onclick="appendValue('7')">7</button>
            <button class="number" onclick="appendValue('8')">8</button>
            <button class="number" onclick="appendValue('9')">9</button>
            <button class="operator" onclick="appendValue('-')">−</button>

            <!-- Baris 3 -->
            <button class="number" onclick="appendValue('4')">4</button>
            <button class="number" onclick="appendValue('5')">5</button>
            <button class="number" onclick="appendValue('6')">6</button>
            <button class="operator" onclick="appendValue('+')">+</button>

            <!-- Baris 4 -->
            <button class="number" onclick="appendValue('1')">1</button>
            <button class="number" onclick="appendValue('2')">2</button>
            <button class="number" onclick="appendValue('3')">3</button>

            <!-- Tombol = memanjang -->
            <button class="equal" onclick="calculate()">=</button>

            <!-- Baris 5 -->
            <button class="number zero" onclick="appendValue('0')">0</button>
            <button class="number" onclick="appendValue('.')">.</button>

        </div>

    </div>

    <script>

        const display =
            document.getElementById("display");

        function appendValue(value) {

            if (display.value === "Error") {
                display.value = "";
            }

            const operators =
                ["+", "-", "*", "/"];

            const lastChar =
                display.value.slice(-1);

            // Hindari operator dobel
            if (
                operators.includes(lastChar) &&
                operators.includes(value)
            ) {
                display.value =
                    display.value.slice(0, -1) + value;
                return;
            }

            display.value += value;
        }

        function clearDisplay() {
            display.value = "";
        }

        function backspace() {
            display.value =
                display.value.slice(0, -1);
        }

        function calculate() {

            try {

                if (
                    display.value.trim() === ""
                ) return;

                let result =
                    eval(display.value);

                if (
                    !Number.isInteger(result)
                ) {
                    result =
                        parseFloat(
                            result.toFixed(6)
                        );
                }

                display.value = result;

            } catch {

                display.value = "Error";
            }
        }

        // Keyboard support
        document.addEventListener(
            "keydown",
            function (e) {

                const allowed =
                    "0123456789+-*/.";

                if (
                    allowed.includes(e.key)
                ) {
                    appendValue(e.key);
                }

                if (e.key === "Enter") {
                    calculate();
                }

                if (e.key === "Backspace") {
                    backspace();
                }

                if (e.key === "Escape") {
                    clearDisplay();
                }
            }
        );

    </script>

</body>
</html>
