<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily You - AETHERNA</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="setup2.css">
</head>
<body>

<a href="setup.html" class="back-btn">
    <span>←</span>
</a>

<form id="dailyForm" class="container">

    <h1>Daily you</h1>
    <p class="subtitle">Tell us about your typical day:</p>

    <div class="cards">

        <div class="card-box">
            <img src="https://cdn-icons-png.flaticon.com/512/1048/1048953.png" alt="sleep">
            <label>Sleep</label>
            <input type="number" placeholder="hours" required>
        </div>

        <div class="card-box">
            <img src="https://cdn-icons-png.flaticon.com/512/69/69906.png" alt="move">
            <label>Move</label>
            <input type="number" placeholder="minutes" required>
        </div>

        <div class="card-box">
            <img src="https://cdn-icons-png.flaticon.com/512/728/728093.png" alt="water">
            <label>Water</label>
            <input type="number" placeholder="glasses" required>
        </div>

    </div>

    <button type="submit" class="next-btn">Next →</button>

</form>

<script type="module" src="setup2.js"></script>

</body>
</html>
