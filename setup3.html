<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibes & Goals - AETHERNA</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="setup3.css">
</head>
<body>
    
<a href="setup2.html" class="back-btn">
    <span>←</span>
</a>

<!-- UBAH JADI FORM -->
<form id="goalsForm" class="container">

    <h1>Your Vibes & Goals</h1>

    <!-- SECTION 1 -->
    <p class="subtitle">How active are you day-to-day?</p>

    <div class="options">
        <label class="option">
            <!-- Tambahkan value dan nama group 'activity' -->
            <input type="radio" name="activity" value="Chill" required>
            <span>Chill</span>
        </label>

        <label class="option">
            <input type="radio" name="activity" value="Moving">
            <span>Moving</span>
        </label>

        <label class="option">
            <input type="radio" name="activity" value="Active">
            <span>Active</span>
        </label>
    </div>

    <!-- SECTION 2 -->
    <p class="subtitle">What are your goals?</p>

    <div class="options">
        <label class="option">
            <!-- Tambahkan value pada checkbox -->
            <input type="checkbox" name="goals" value="Feel healthier">
            <span>Feel healthier</span>
        </label>

        <label class="option">
            <input type="checkbox" name="goals" value="Lose weight">
            <span>Lose weight</span>
        </label>

        <label class="option">
            <input type="checkbox" name="goals" value="Get stronger">
            <span>Get stronger</span>
        </label>

        <label class="option">
            <input type="checkbox" name="goals" value="Just maintain">
            <span>Just maintain</span>
        </label>
    </div>

    <!-- BUTTON SEBAGAI SUBMIT -->
    <button type="submit" class="main-btn">
        Let's do this!
    </button>

    <p class="note">You can always update these later in profile</p>

</form>

<!-- HUBUNGKAN KE JS -->
<script type="module" src="setup3.js"></script>

</body>
</html>
