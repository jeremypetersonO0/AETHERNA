<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Log - Aetherna</title>
    <link rel="stylesheet" href="userlog_admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>

<div class="dashboard-container">

    <!-- SIDEBAR -->
   <aside class="sidebar">
    <div class="logo-box">
        <img src="LOGO.png" alt="Aetherna">
        <h3>AETHERNA</h3>
    </div>
    
    <nav class="sidebar-nav">
        <p class="section-label">Feature</p>
        <ul>
            <li class="nav-item"><a href="dashboard_admin.html"><i class="fa-solid fa-table-columns"></i> Dashboard</a></li>
            <li class="nav-item active"><a href="#"><i class="fa-solid fa-book"></i> User Log</a></li>
            <li class="nav-item"><a href="content_admin.html"><i class="fa-solid fa-file-lines"></i> Content</a></li>
            <li class="nav-item"><a href="analytics_admin.html"><i class="fa-solid fa-chart-simple"></i> Analytics</a></li>
            <li class="nav-item"><a href="play_admin.html"><i class="fa-solid fa-gamepad"></i> Play</a></li>
            <p class="section-label">General</p>
            <li class="nav-item">
                    <a href="logout_admin.html">
                        <span>⏻</span> Log Out
                    </a> </li>
        </ul>
    </nav>
</aside>

    <!-- MAIN -->
    <main class="main-content">

        <h1>User Log</h1>

        <!-- SEARCH & FILTER -->
        <div class="top-bar">
            <input type="text" id="searchInput" placeholder="Search by name">
            <select id="filterStatus">
                <option value="all">All</option>
                <option value="Good">Good</option>
                <option value="Moderate">Moderate</option>
                <option value="Low">Low</option>
            </select>
        </div>

        <!-- TABLE -->
        <div class="table-container">
            <table id="userTable">
                <thead>
                    <tr>
                        <th>User Profile</th>
                        <th>Date</th>
                        <th>Sleep</th>
                        <th>Water</th>
                        <th>Exercise</th>
                        <th>Breaks</th>
                        <th>Food</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    
                </tbody>
            </table>
        </div>

    </main>
</div>

<script type="module" src="userlog_admin.js"></script>
</body>
</html>
